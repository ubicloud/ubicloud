SPECIFICATION Spec

\* Model: 3 nodes (allows chained migration n1->n2->n3), 1 volume
\* MaxRetries = 3 matches MAX_MIGRATION_RETRIES in node_service.rb
CONSTANTS
  n1 = n1
  n2 = n2
  n3 = n3
  v1 = v1
  NoNode = NoNode
  Nodes = {n1, n2, n3}
  Volumes = {v1}
  MaxRetries = 3

\* All safety invariants (should pass)
INVARIANT TypeOK
INVARIANT SafetyInvariant

\* Liveness (use FairSpec instead of Spec)
\* PROPERTY Liveness
\* PROPERTY StuckGetsPaged
