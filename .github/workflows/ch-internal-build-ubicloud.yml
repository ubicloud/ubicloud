name: Build Push UbiCloud Images

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
on:
  push:
    branches:
      - clickhouse
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches:
      - clickhouse
  workflow_dispatch:
    inputs: { }

jobs:
  # add tests or custom stuff?
  generateVersion:
    uses: ./.github/workflows/ch-internal-reusable-generate-version.yml
    with:
      major-version: '2'

  build-and-push:
    needs: [ generateVersion ]
    uses: ./.github/workflows/ch-internal-reusable-build-and-push.yml
    permissions: write-all
    with:
      role-to-assume: ${{ vars.ECR_PUSH_ROLE_ARN }}
      role-session-name: ubicloud-internal
      aws-region: ${{ vars.ECR_REGION }}
      tags: clickgres-ubicloud:${{needs.generateVersion.outputs.VERSION_TAG}}
      file: ./Dockerfile
      sha: ${{ github.sha }}
      context: .
      build-args: |
        SERVICE_VERSION=${{needs.generateVersion.outputs.VERSION_TAG}}
      depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
      push: ${{ github.actor != 'dependabot[bot]' }}
    secrets: inherit

  tagVersion:
    if: ${{ github.event_name == 'push' }}
    permissions: write-all
    needs: [ generateVersion, build-and-push ]
    uses: ./.github/workflows/ch-internal-reusable-tag-version.yml
    with:
      tag: clickgres-ubicloud-${{needs.generateVersion.outputs.VERSION_TAG}}
      release: ${{ github.event_name == 'push' }}
  callClickgresBuilds:
    if: ${{ github.event_name == 'push' }}
    needs: [ generateVersion, tagVersion ]
    strategy:
      matrix:
        service:
          - api
          - workers
    runs-on: k8s-nano
    steps:
      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKFLOW_AUTH_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTH_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ secrets.CLICKGRES_REPO }}
      - name: Call workflow via gh
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh workflow run --repo ClickHouse/${{ secrets.CLICKGRES_REPO }} clickgres-${{ matrix.service }}.yml -f ubicloud-version=${{needs.generateVersion.outputs.VERSION_TAG}}
