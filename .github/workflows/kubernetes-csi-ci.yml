name: kubernetes/csi CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.tool-versions'
      - 'kubernetes/csi/**'
      - '.github/workflows/kubernetes-csi-ci.yml'
  pull_request:
    paths:
      - '.tool-versions'
      - 'kubernetes/csi/**'
      - '.github/workflows/kubernetes-csi-ci.yml'

jobs:
  kubernetes-csi-ci:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubicloud-standard-2, ubicloud-standard-2-arm]
    name: Ruby CI - ${{matrix.runs-on}}
    runs-on: ${{matrix.runs-on}}
    timeout-minutes: 25

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Ruby for CSI gems
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      env:
        BUNDLE_GEMFILE: kubernetes/csi/Gemfile
      with:
        ruby-version: mise.toml
        bundler-cache: true

    - name: Run CSI tests
      run: rake csi_spec
