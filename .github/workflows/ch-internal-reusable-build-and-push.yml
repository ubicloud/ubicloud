name: Build and push images to ECR

on:
  workflow_call:
    inputs:
      role-to-assume:
        description: "AWS Role to assume to push images to ECR"
        required: true
        type: string
      role-session-name:
        description: "Session name for the assumed AWS role"
        required: true
        type: string
      aws-region:
        description: "AWS region to use to get AWS credentials"
        required: true
        type: string
      tags:
        description: "Tags to use for the image"
        required: true
        type: string
      file:
        description: "File to use for the build"
        required: true
        type: string
      context:
        description: "Context to use for the image"
        required: false
        type: string
      build-args:
        description: "List of build-time variables"
        required: false
        type: string
      depot-project-id:
        description: "Depot project id"
        required: true
        type: string
      use-gh-token:
        description: "Use GitHub token for checkout"
        required: false
        type: boolean
      sha:
        description: "SHA to use for the build"
        required: false
        type: string
      push:
        description: "Push the image"
        required: false
        type: boolean

jobs:
  build-and-push:
    runs-on: k8s-medium
    steps:
      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          role-session-name: ${{ inputs.role-session-name}}
          aws-region: ${{ inputs.aws-region }}

      - name: Set up Depot CLI
        uses: depot/setup-action@b0b1ea4f69e92ebf5dea3f8713a1b0c37b2126a5 #v1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Assemble ECR tags
        id: ecr-tags
        run: |
          tags="${{steps.login-ecr.outputs.registry}}/${{ inputs.tags }}"
          echo "tags=$tags" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha }}
      - name: Build and push the image
        uses: depot/build-push-action@9785b135c3c76c33db102e45be96a25ab55cd507 #v1
        with:
          project: ${{ inputs.depot-project-id }}
          tags: ${{ steps.ecr-tags.outputs.tags }}
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          build-args: ${{ inputs.build-args }}
          platforms: linux/amd64, linux/arm64
          push: ${{ inputs.push }}
          labels: |
            version=${{ inputs.tags }}
