name: 'Setup Clover'

inputs:
  setup-node:
    description: 'Set up Node.js and install npm dependencies'
    required: false
    type: boolean
    default: false

runs:
  using: "composite"
  steps:
    - name: Setup tool cache directory
      shell: bash
      run: |
        sudo mkdir -p /opt/hostedtoolcache && sudo chown -R "$(whoami)":"$(whoami)" /opt/hostedtoolcache

    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev libffi-dev libpq-dev build-essential locales

        # Generate and set locale
        sudo locale-gen en_US.UTF-8
        sudo update-locale LANG=en_US.UTF-8

    - name: Setup PostgreSQL
      shell: bash
      env:
        LANG: en_US.UTF-8
        LC_ALL: en_US.UTF-8
      run: |
        # Install PostgreSQL
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y postgresql-17 postgresql-client-17

        # Initialize a fresh data directory
        export PGDATA="$HOME/pgdata"
        mkdir -p "$PGDATA"
        /usr/lib/postgresql/17/bin/initdb -D "$PGDATA" --auth=trust --locale=C.UTF-8

        # Configure PostgreSQL to use home directory for socket
        echo "unix_socket_directories = '$HOME'" >> "$PGDATA/postgresql.conf"

        # Start PostgreSQL
        /usr/lib/postgresql/17/bin/pg_ctl -D "$PGDATA" -l "$HOME/postgres.log" start

        # Tail logs in background
        tail -f "$HOME/postgres.log" &

        # Wait for PostgreSQL to be ready
        export PGHOST="$HOME"
        for i in {1..30}; do
          /usr/lib/postgresql/17/bin/pg_isready && break
          sleep 1
        done

        # Create postgres role as alias to current user
        createuser -s postgres || true

        # Make PGHOST available to subsequent steps
        echo "PGHOST=$HOME" >> $GITHUB_ENV

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: .tool-versions
        bundler-cache: true

    - name: Set up Ruby for CSI gems
      uses: ruby/setup-ruby@v1
      env:
        BUNDLE_GEMFILE: kubernetes/csi/Gemfile
      with:
        ruby-version: .tool-versions
        bundler-cache: true

    - name: Create .env.rb file
      shell: bash
      run: "bundle exec rake overwrite_envrb && echo '$stdout.sync = true' >> .env.rb"

    - name: Setup clover database
      shell: bash
      run: |
        createuser clover
        createuser clover_password
        bundle exec rake setup_database\[test,true\]

    - name: Set up Node.js
      if: ${{ inputs.setup-node == 'true' }}
      uses: actions/setup-node@v6
      with:
        node-version-file: "package.json"
        cache: "npm"

    - name: Install node packages
      if: ${{ inputs.setup-node == 'true' }}
      shell: bash
      run: npm ci
